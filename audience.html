      <aside class="sidebar"><div class="brand"><div class="brand-mark">M</div><div><strong>MoreYeahs</strong><span>AI Email Automation</span></div></div><nav class="nav-list"><a href="index.html">Journey Home</a><details class="nav-dropdown" open><summary>Campaign Studio</summary><a href="setup.html">Setup</a><a href="mailbox.html">Mailbox</a><a class="active" href="audience.html">Audience</a><a href="campaign.html">Campaign</a><a href="launch.html">Launch</a></details><a href="dashboard.html">Dashboard</a><a href="inbox.html">Inbox</a></nav></aside>

          <label class="textarea-label">Contacts<textarea id="contactsInput" rows="14" spellcheck="false" placeholder="email,firstName,company,role,industry,country,continent,interest,source,status,forwarded,consent"></textarea></label>
          <div class="action-row"><button class="primary-button" id="importContactsButton" type="button">Import and segment contacts</button><span class="muted" id="contactImportStatus">No contacts imported yet.</span></div>
        </section>
      </main>
